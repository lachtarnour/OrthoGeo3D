experiment:
  name: teethseg22_posnorm6ch_15k_b8
  seed: 42
  output_dir: /workspace/outputs/experiments

model:
  name: dgcnn_segmentation
  input_channels: 6
  num_classes: 17
  k: 20
  emb_dims: 1024
  dropout: 0.3

data:
  config_path: configs/data.yaml
  train_split: train
  val_split: val
  train_limit: null
  val_limit: null
  dataloader:
    train:
      batch_size: 8
      num_workers: 4
      shuffle: true
      pin_memory: true
      persistent_workers: true
      prefetch_factor: 2
    eval:
      batch_size: 8
      num_workers: 4
      shuffle: false
      pin_memory: true
      persistent_workers: true
      prefetch_factor: 2
  sampling:
    num_points: 15000
    method: overlapping_multiview
    core_points: 10000
    num_views: 10
    eval_view: 0
    eval_views: [0, 3, 6]
    seed: 42

optim:
  epochs: 100
  lr: 0.001
  weight_decay: 0.0001
  grad_clip: 1.0
  amp: true
  device: cuda
  scheduler:
    name: cosine
    min_lr: 0.00005

performance:
  tf32: true
  float32_matmul_precision: high
  cudnn_benchmark: false

validation:
  every_epochs: 3
  last_epoch: true

loss:
  components:
    cross_entropy:
      enabled: true
      weight: 1.0
      max_loss: 6.0
    dice:
      enabled: true
      weight: 1.0
      include_background: false
      smooth: 1.0
    binary:
      enabled: true
      weight: 0.5
      max_loss: 6.0

logging:
  every_epochs: 3
  log_train_steps: false
  wandb: true
  project: OrthoTwin3D

checkpoint:
  save_every_epochs: 10
  monitor: val_miou
  mode: max
